name: "CodeQL"

on:
  push:
    branches: [ 'main' ]
    paths-ignore:
      - "**.md"
      - "*.txt"
      - ".github/**" 
  pull_request:
    branches: [ 'main' ]
    paths-ignore:
      - "**.md"
      - "*.txt"
      - ".github/**" 
  schedule:
    - cron: '0 19 * * 6'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'java' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
    
    - name: Setup Java
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        java-version: 21
        distribution: 'temurin'
          
    - name: Initialize CodeQL
      uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
      with:
        languages: ${{ matrix.language }}

    - if: matrix.language == 'java'
      name: Build
      run: mvn package -DskipTests -Dcheckstyle.skip=true
        
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
      with:
        category: "/language:${{matrix.language}}"
